name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Patient app
      - name: Install patient app dependencies
        working-directory: apps/patient
        run: npm install --legacy-peer-deps

      - name: Build patient app
        working-directory: apps/patient
        run: npm run build

      # Doctor app
      - name: Install doctor app dependencies
        working-directory: apps/doctor
        run: npm install --legacy-peer-deps

      - name: Build doctor app
        working-directory: apps/doctor
        run: npm run build

      # Admin app
      - name: Install admin app dependencies
        working-directory: apps/admin
        run: npm install --legacy-peer-deps

      - name: Build admin app
        working-directory: apps/admin
        run: npm run build

      # Backend
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests
        working-directory: backend
        run: echo "No tests configured yet"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            if [ ! -d "/home/ubuntu/medilink/.git" ]; then
              git clone https://github.com/Suraj-07823/MediLink.git /home/ubuntu/medilink
            fi

            cd /home/ubuntu/medilink

            echo "Pulling latest code..."
            git pull origin main

            echo "Stopping old containers..."
            docker compose down

            echo "Building backend..."
            docker compose build backend

            echo "Building patient app..."
            docker compose build patient-app

            echo "Building doctor app..."
            docker compose build doctor-app

            echo "Building admin app..."
            docker compose build admin-app

            echo "Starting containers..."
            docker compose up -d

            echo "Removing unused Docker images..."
            docker image prune -f

            echo "Deployment completed successfully!"