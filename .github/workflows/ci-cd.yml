name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Backend
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests
        working-directory: backend
        run: echo "No tests configured yet"

      # Docker validation
      - name: Build nginx Docker image
        run: docker build -t medilink-nginx -f nginx/Dockerfile .

      - name: Build backend Docker image
        run: docker build -t medilink-backend -f backend/Dockerfile backend

  deploy:
    needs: build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Clone repo if it doesn't exist yet
            if [ ! -d "/home/ubuntu/medilink/.git" ]; then
              git clone https://github.com/Suraj-07823/MediLink.git /home/ubuntu/medilink
            fi

            cd /home/ubuntu/medilink

            echo "Pulling latest code..."
            git pull origin main

            echo "Stopping old containers..."
            docker compose down

            echo "Building and starting containers..."
            docker compose up -d --build

            echo "Removing unused Docker images..."
            docker image prune -f

            echo "Deployment completed successfully!"