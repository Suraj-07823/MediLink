version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/medilink
      - JWT_SECRET=supersecretkey
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    networks:
      - medilink-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - medilink-net

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - medilink-net

volumes:
  mongo-data:

networks:
  medilink-net:
    driver: bridge
