services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/medilink
      - JWT_SECRET=supersecretkey
      - MONGO_RETRY_DELAY_MS=3000
    ports:
      - "5000:5000"
    restart: unless-stopped
    depends_on:
      - mongo
    networks:
      - medilink-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - medilink-net

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongo --eval "db.runCommand({ ping: 1 })" || mongosh --eval "db.runCommand({ ping: 1 })"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - medilink-net

volumes:
  mongo-data:

networks:
  medilink-net:
    driver: bridge
